<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Mood Board Generator</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; color: #1a1a1a; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 2rem 1rem; }
  .container { width: 100%; max-width: 620px; }
  h1 { font-size: 22px; font-weight: 500; margin-bottom: 6px; }
  .subtitle { font-size: 14px; color: #666; margin-bottom: 2rem; }
  .mood-grid { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 1.5rem; }
  .mood-btn { padding: 8px 18px; border-radius: 20px; border: 1.5px solid #ccc; background: #fff; color: #555; font-size: 13px; cursor: pointer; transition: all 0.15s; }
  .mood-btn:hover { background: #f0f0ee; }
  .mood-btn.active { color: #1a1a1a; border-color: #888; font-weight: 500; }
  .mood-name { font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: #999; margin-bottom: 8px; }
  .palette-row { display: flex; gap: 0; border-radius: 12px; overflow: hidden; height: 80px; margin-bottom: 1rem; }
  .swatch { flex: 1; position: relative; cursor: pointer; transition: flex 0.25s ease; }
  .swatch:hover { flex: 2; }
  .swatch-label { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); font-size: 10px; font-weight: 500; opacity: 0; transition: opacity 0.2s; white-space: nowrap; padding: 2px 6px; border-radius: 4px; background: rgba(0,0,0,0.25); color: #fff; }
  .swatch:hover .swatch-label { opacity: 1; }
  .hero-card { border-radius: 10px; overflow: hidden; border: 0.5px solid #ddd; margin-bottom: 1rem; }
  .hero-top { height: 90px; display: flex; align-items: center; justify-content: center; }
  .hero-bottom { padding: 12px; background: #fff; display: flex; gap: 8px; align-items: center; }
  .hero-dot { width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0; }
  .hero-lines { flex: 1; }
  .card-line { height: 6px; border-radius: 3px; margin-bottom: 6px; }
  .card-line-short { height: 6px; border-radius: 3px; width: 60%; }
  .card-accent { height: 24px; border-radius: 4px; width: 40%; margin-top: 8px; }
  .layout-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1.25rem; }
  .layout-card { border-radius: 8px; overflow: hidden; border: 0.5px solid #ddd; }
  .card-header { height: 48px; }
  .card-body { padding: 10px; background: #fff; }
  .copy-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1rem; }
  .hex-chip { font-size: 11px; padding: 4px 10px; border-radius: 20px; border: 0.5px solid #ddd; color: #555; cursor: pointer; font-family: monospace; background: #fff; }
  .hex-chip:hover { background: #f0f0ee; }
  .copied { color: #2e6b3a !important; border-color: #5e9e6b !important; }
  .regen-btn { font-size: 13px; padding: 9px 22px; border-radius: 8px; border: 1px solid #ccc; background: #fff; color: #1a1a1a; cursor: pointer; margin-top: 0.5rem; }
  .regen-btn:hover { background: #f0f0ee; }
  .footer { margin-top: 2rem; font-size: 12px; color: #aaa; text-align: center; }
</style>
</head>
<body>
<div class="container">
  <h1>Color Mood Board Generator</h1>
  <p class="subtitle">Pick a mood to generate a matching color palette and UI layout preview.</p>

  <div class="mood-grid" id="moods"></div>
  <div class="mood-name" id="mood-label">SERENE</div>
  <div class="palette-row" id="palette"></div>

  <div class="hero-card">
    <div class="hero-top" id="hero-top">
      <div style="text-align:center;">
        <div style="width:44px;height:4px;border-radius:2px;background:rgba(255,255,255,0.5);margin:0 auto 6px;"></div>
        <div style="width:28px;height:4px;border-radius:2px;background:rgba(255,255,255,0.3);margin:0 auto;"></div>
      </div>
    </div>
    <div class="hero-bottom">
      <div class="hero-dot" id="hero-dot"></div>
      <div class="hero-lines">
        <div class="card-line" id="hero-line1" style="width:70%;"></div>
        <div class="card-line-short" id="hero-line2" style="margin-top:5px;"></div>
      </div>
      <div class="card-accent" id="hero-btn"></div>
    </div>
  </div>

  <div class="layout-grid" id="cards"></div>
  <div class="copy-row" id="hexes"></div>
  <button class="regen-btn" onclick="nextVariant()">Shuffle variant ↻</button>

  <div class="footer">Click any hex code to copy &nbsp;·&nbsp; Built with HTML, CSS & JavaScript</div>
</div>

<script>
const moods = {
  Serene: [["#C8DFF0","#92B8D4","#5B8FA8","#2E5F78","#1A3A4A"],["#D4E8D0","#9FC9A0","#5E9E6B","#2E6B3A","#13401D"]],
  Warm:   [["#F7E4C8","#F0BA80","#E07B3A","#B54A18","#7A2A0A"],["#FDE8D8","#F9C0A0","#F28060","#C04030","#7A1820"]],
  Bold:   [["#F0E8FF","#C8A0F8","#9040E8","#5010B0","#280870"],["#FFE8F0","#F8A0C0","#E04080","#A01050","#600030"]],
  Earth:  [["#F2EDE4","#D6C5A8","#A88C68","#7A5C38","#4A3018"],["#EAE8E0","#C8C0A8","#A09078","#706050","#403830"]],
  Night:  [["#E8ECF8","#B0BCEC","#6070C8","#2838A0","#101878"],["#ECE8F8","#C0B0EC","#7060C8","#3828A0","#181078"]],
};

const moodNames = Object.keys(moods);
let activeMood = "Serene", variantIdx = 0;

function getPalette() {
  const variants = moods[activeMood];
  return variants[variantIdx % variants.length];
}

function render() {
  const pal = getPalette();
  document.getElementById('mood-label').textContent = activeMood.toUpperCase();

  const pr = document.getElementById('palette');
  pr.innerHTML = pal.map(c => `<div class="swatch" style="background:${c}"><span class="swatch-label">${c}</span></div>`).join('');

  document.getElementById('hero-top').style.background = `linear-gradient(135deg, ${pal[2]}, ${pal[3]})`;
  document.getElementById('hero-dot').style.background = pal[1];
  document.getElementById('hero-line1').style.background = pal[3];
  document.getElementById('hero-line2').style.background = pal[1];
  document.getElementById('hero-btn').style.background = pal[2];

  const cardData = [[pal[0], pal[3], pal[2]], [pal[4], pal[1], pal[2]]];
  document.getElementById('cards').innerHTML = cardData.map(([bg,line,accent]) => `
    <div class="layout-card">
      <div class="card-header" style="background:${bg}"></div>
      <div class="card-body">
        <div class="card-line" style="background:${line};opacity:0.4"></div>
        <div class="card-line-short" style="background:${line};opacity:0.25;height:6px;border-radius:3px;"></div>
        <div class="card-accent" style="background:${accent}"></div>
      </div>
    </div>`).join('');

  document.getElementById('hexes').innerHTML = pal.map(c =>
    `<span class="hex-chip" onclick="copyHex(this,'${c}')">${c}</span>`
  ).join('');
}

function copyHex(el, hex) {
  navigator.clipboard && navigator.clipboard.writeText(hex);
  el.classList.add('copied');
  el.textContent = 'copied!';
  setTimeout(() => { el.classList.remove('copied'); el.textContent = hex; }, 1200);
}

function nextVariant() { variantIdx++; render(); }

function setMood(m) {
  activeMood = m; variantIdx = 0;
  document.querySelectorAll('.mood-btn').forEach(b => b.classList.toggle('active', b.textContent === m));
  render();
}

const mg = document.getElementById('moods');
mg.innerHTML = moodNames.map(m =>
  `<button class="mood-btn ${m===activeMood?'active':''}" onclick="setMood('${m}')">${m}</button>`
).join('');

render();
</script>
</body>
</html>
